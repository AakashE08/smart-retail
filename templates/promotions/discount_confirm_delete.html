{% extends 'base.html' %}
{% load static %}

{% block title %}Delete Discount{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="row">
        <div class="col-12">
            <div class="card">
                <div class="card-header">
                    <h5 class="card-title mb-0">Delete Discount</h5>
                </div>
                <div class="card-body">
                    <div class="alert alert-danger">
                        <h4 class="alert-heading">Are you sure?</h4>
                        <p>You are about to delete the discount code "{{ object.code }}".</p>
                        <hr>
                        <p class="mb-0">This action cannot be undone.</p>
                    </div>

                    <form method="post">
                        {% csrf_token %}
                        <div class="mt-4">
                            <button type="submit" class="btn btn-danger">
                                <i class="fas fa-trash me-2"></i>Yes, Delete
                            </button>
                            <a href="{% url 'promotions:discount_list' %}" class="btn btn-secondary">
                                <i class="fas fa-times me-2"></i>Cancel
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
