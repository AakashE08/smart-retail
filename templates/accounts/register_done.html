{% extends 'base.html' %}

{% block title %}Registration Successful - Retail Management System{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-lg text-center">
                <div class="card-body p-5">
                    <div class="mb-4">
                        <i class="fas fa-check-circle text-success" style="font-size: 4rem;"></i>
                    </div>

                    <h2 class="mb-4">Registration Successful!</h2>

                    <p class="mb-4">
                        Thank you for registering with our Retail Management System.
                        Your account has been created successfully.
                    </p>

                    <div class="d-grid gap-2">
                        <a href="{% url 'login' %}" class="btn btn-primary">
                            <i class="fas fa-sign-in-alt me-2"></i>Proceed to Login
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .card {
        border: none;
        border-radius: 15px;
    }

    .btn-primary {
        padding: 10px;
        font-weight: 500;
    }
</style>
{% endblock %}
