{% extends 'base.html' %}
{% load static %}

{% block title %}Password Changed{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-body text-center">
                    <i class="fas fa-check-circle fa-4x text-success mb-4"></i>
                    <h1 class="card-title mb-4">Password Changed Successfully</h1>
                    <p class="text-muted mb-4">Your password has been updated. You can now use your new password to log
                        in.</p>
                    <div class="d-grid gap-2">
                        <a href="{% url 'profile' %}" class="btn btn-primary">Back to Profile</a>
                        <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary">Go to Dashboard</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
